{% extends "base.html" %}
{% block title %}내 정보 - 예맛 생산관리{% endblock %}

{% block content %}
<h1 style="margin-bottom:1.5rem;">👤 내 정보</h1>

<div class="grid grid-2" style="gap:1.5rem;">
    <!-- 기본 정보 -->
    <div class="card">
        <h2>기본 정보</h2>
        <form method="POST">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" value="{{ user.username }}" readonly style="background:#f5f5f5;">
            </div>
            <div class="form-group">
                <label>이름</label>
                <input type="text" name="name" value="{{ user.name or '' }}" placeholder="이름 입력">
            </div>
            <div class="form-group">
                <label>전화번호</label>
                <input type="text" name="phone" value="{{ user.phone or '' }}" placeholder="010-1234-5678">
            </div>
            <div class="form-group">
                <label>이메일</label>
                <input type="email" name="email" value="{{ user.email or '' }}" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label>부서</label>
                <input type="text" name="department" value="{{ user.department or '' }}" placeholder="부서명">
            </div>
            <div class="form-group">
                <label>근무지 1</label>
                <input type="text" name="workplace1" value="{{ user.workplace1 or '' }}" placeholder="근무지 1">
            </div>
            <div class="form-group">
                <label>근무지 2</label>
                <input type="text" name="workplace2" value="{{ user.workplace2 or '' }}" placeholder="근무지 2">
            </div>
            <div style="text-align:right;margin-top:1rem;">
                <button type="submit" class="btn">정보 저장</button>
            </div>
        </form>
    </div>

    <!-- 비밀번호 변경 -->
    <div class="card">
        <h2>비밀번호 변경</h2>
        <form method="POST" action="/profile/change-password" onsubmit="return validatePassword()">
            <div class="form-group">
                <label>현재 비밀번호 <span style="color:#e74c3c;">*</span></label>
                <input type="password" name="current_password" id="current_pw" required>
            </div>
            <div class="form-group">
                <label>새 비밀번호 <span style="color:#e74c3c;">*</span></label>
                <input type="password" name="new_password" id="new_pw" required minlength="4">
                <small style="color:#666;">최소 4자 이상</small>
            </div>
            <div class="form-group">
                <label>새 비밀번호 확인 <span style="color:#e74c3c;">*</span></label>
                <input type="password" name="confirm_password" id="confirm_pw" required>
            </div>
            <div style="text-align:right;margin-top:1rem;">
                <button type="submit" class="btn" style="background:#f39c12;">비밀번호 변경</button>
            </div>
        </form>
        
        <div style="margin-top:2rem;padding:1rem;background:#fff3cd;border-radius:8px;border-left:4px solid #ffc107;">
            <strong style="color:#856404;">💡 보안 안내</strong>
            <ul style="margin:0.5rem 0 0 1.25rem;color:#856404;font-size:0.9rem;">
                <li>비밀번호는 주기적으로 변경해주세요</li>
                <li>다른 사이트와 동일한 비밀번호 사용을 피하세요</li>
                <li>타인에게 비밀번호를 공유하지 마세요</li>
            </ul>
        </div>
    </div>
</div>

<script>
function validatePassword(){
    const newPw = document.getElementById('new_pw').value;
    const confirmPw = document.getElementById('confirm_pw').value;
    
    if(newPw.length < 4){
        alert('새 비밀번호는 최소 4자 이상이어야 합니다.');
        return false;
    }
    
    if(newPw !== confirmPw){
        alert('새 비밀번호가 일치하지 않습니다.');
        return false;
    }
    
    return true;
}
</script>
{% endblock %}

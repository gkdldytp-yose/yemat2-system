<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>회원가입 - 예맛</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
             background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
             min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
        .register-box{background:white;border-radius:16px;padding:2rem;width:100%;max-width:500px;box-shadow:0 8px 32px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto;}
        .logo{text-align:center;font-size:2rem;margin-bottom:0.5rem;}
        .title{text-align:center;font-size:1.25rem;font-weight:700;color:#2c3e50;margin-bottom:1.5rem;}
        .form-group{margin-bottom:1rem;}
        .form-group label{display:block;font-weight:600;margin-bottom:0.4rem;color:#495057;font-size:0.85rem;}
        .form-group input{width:100%;padding:0.65rem;border:2px solid #e1e8ed;border-radius:8px;font-size:0.9rem;}
        .form-group input:focus{border-color:#667eea;outline:none;box-shadow:0 0 0 3px rgba(102,126,234,0.1);}
        .btn{width:100%;padding:0.75rem;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;
             border-radius:8px;font-weight:700;font-size:0.95rem;cursor:pointer;margin-top:0.5rem;}
        .btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(102,126,234,0.3);}
        .btn-secondary{background:linear-gradient(135deg,#6c757d,#495057);}
        .error{background:#ffebee;color:#c62828;padding:0.65rem;border-radius:8px;margin-bottom:1rem;font-size:0.8rem;border-left:4px solid #c62828;}
        .login-link{text-align:center;margin-top:1rem;font-size:0.85rem;color:#7f8c8d;}
        .login-link a{color:#667eea;text-decoration:none;font-weight:600;}
        @media (max-width: 768px) {
            .register-box{padding:1.5rem;border-radius:12px;}
            .logo{font-size:1.75rem;}
            .title{font-size:1.1rem;}
        }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="logo"><img src="/static/img/yemat_logo.svg" alt="예맛" style="height:64px;max-width:100%;"></div>
        <h1 class="title">예맛 생산관리 회원가입</h1>
        
        {% if error %}
        <div class="error">❌ {{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label>아이디 *</label>
                <input type="text" name="username" required placeholder="영문/숫자 조합">
            </div>
            <div class="form-group">
                <label>비밀번호 *</label>
                <input type="password" name="password" required placeholder="6자 이상">
            </div>
            <div class="form-group">
                <label>비밀번호 확인 *</label>
                <input type="password" name="password_confirm" required placeholder="비밀번호 재입력">
            </div>
            <div class="form-group">
                <label>이름</label>
                <input type="text" name="name" placeholder="실명">
            </div>
            <div class="form-group">
                <label>연락처</label>
                <input type="tel" name="phone" placeholder="010-0000-0000">
            </div>
            <div class="form-group">
                <label>이메일</label>
                <input type="email" name="email" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>부서</label>
                <input type="text" name="department" placeholder="소속 부서">
            </div>
            <div style="display:flex;gap:0.5rem;margin-top:1rem;">
                <a href="/login" class="btn btn-secondary" style="text-decoration:none;text-align:center;">취소</a>
                <button type="submit" class="btn">가입하기</button>
            </div>
        </form>
        
        <div class="login-link">
            이미 계정이 있으신가요? <a href="/login">로그인</a>
        </div>
    </div>
</body>
</html>
